version: '3.8'

services:
  ems:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ems-app
    restart: unless-stopped
    # Direct port 3000 mapping removed; accessible via Nginx
    expose:
      - "3000"
    environment:
      - DATABASE_URL=postgresql://webuser:StatuS123@192.168.0.137:5432/ems
      - JWT_SECRET=gis-team-ems-secret-key-change-in-production-2024
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - REPORT_EMAIL_TO=${REPORT_EMAIL_TO:-}
      - TZ=Asia/Kolkata
    networks:
      - ems-network

  nginx:
    image: nginx:alpine
    container_name: ems-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ems
    networks:
      - ems-network

networks:
  ems-network:
    driver: bridge
